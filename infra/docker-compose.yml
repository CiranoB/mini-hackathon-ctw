services:
  ministack:
    image: ministackorg/ministack:1.3
    container_name: ministack
    environment:
      MINISTACK_REGION: us-east-1
      PERSIST_STATE: "1"
      S3_PERSIST: "1"
    ports:
      - "4566:4566"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ministack_state:/tmp/ministack-state
      - ministack_s3:/tmp/ministack-data/s3

volumes:
  ministack_state:
  ministack_s3:
