services:
  ministack:
    image: ministackorg/ministack:1.3-full
    container_name: ministack
    environment:
      MINISTACK_REGION: us-east-1
      PERSIST_STATE: "1"
      S3_PERSIST: "1"
      ATHENA_ENGINE: duckdb
    expose:
      - "4566"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ministack_state:/tmp/ministack-state
      - ministack_s3:/tmp/ministack-data/s3

  toxiproxy:
    image: ghcr.io/shopify/toxiproxy:2.9.0
    container_name: toxiproxy
    command: ["-host=0.0.0.0", "-config=/config/toxiproxy.json"]
    ports:
      - "4566:4566"   # API/clients hit ministack through the proxy here
      - "8474:8474"   # Toxiproxy admin API (add/remove latency toxics)
    volumes:
      - ./resources/toxiproxy.json:/config/toxiproxy.json:ro
    depends_on:
      - ministack

  # One-shot init: applies the latency toxic so the delay is always present
  # without a manual ./latency.sh call. Override via LATENCY_MS / JITTER_MS.
  toxics-init:
    image: curlimages/curl:8.10.1
    container_name: toxics-init
    restart: "no"
    environment:
      TOXIPROXY_ADMIN: http://toxiproxy:8474
      PROXY: ministack
      LATENCY_MS: "150"
      JITTER_MS: "0"
    volumes:
      - ./resources/apply-toxics.sh:/apply-toxics.sh:ro
    entrypoint: ["sh", "/apply-toxics.sh"]
    depends_on:
      - toxiproxy

  api:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: api
    environment:
      # Route AWS SDK traffic through toxiproxy so latency toxics apply.
      AWS_ENDPOINT_URL: http://toxiproxy:4566
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      VEHICLE_DATA_BUCKET: vehicle-data
      VEHICLE_DATA_PREFIX: parquet/
      ATHENA_OUTPUT_LOCATION: s3://athena-results/
    ports:
      - "8000:8000"
    # Resource limits — must stay within the challenge constraints.
    # mem_limit: 1024m
    cpus: 0.5
    depends_on:
      - toxiproxy
      - toxics-init

volumes:
  ministack_state:
  ministack_s3:
